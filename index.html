<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>나의 소비패턴 돌아보기</title>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f2f2f0;
      --card: #ffffff;
      --border: #e6e6e3;
      --text-primary: #111111;
      --text-secondary: #555555;
      --text-muted: #aaaaaa;
      --accent: #3d6bce;
      --accent-hover: #2d56b0;
      --positive: #2e9e6b;
      --negative: #d94f4f;
      --radius: 16px;
    }

    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* 숫자 입력 스피너 제거 */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }

    /* 탭 바 — 상단 고정 */
    .tab-bar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 8px 16px;
      gap: 8px;
    }
    .tab-btn {
      flex: 1;
      height: 42px;
      border: none;
      background: transparent;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: inherit;
      color: var(--text-muted);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .tab-btn.active {
      background: var(--accent);
      color: #fff;
    }

    /* 스크롤 영역 */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .scroll-area {
      padding: 16px 16px calc(env(safe-area-inset-bottom) + 100px);
      max-width: 600px;
      margin: 0 auto;
    }

    /* 페이지 헤더 */
    .page-header { padding: 20px 0 4px; margin-bottom: 16px; }
    .page-header h1 {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    /* 카드 */
    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
    }
    .card-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    /* 수입 입력 */
    .income-row { display: flex; align-items: center; gap: 12px; }
    .income-row span {
      font-size: 0.95rem;
      color: var(--text-secondary);
      white-space: nowrap;
    }
    .field { position: relative; flex: 1; }
    .field input {
      width: 100%;
      height: 48px;
      padding: 0 36px 0 14px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 1rem;
      font-family: inherit;
      background: #fafaf9;
      color: var(--text-primary);
      outline: none;
      text-align: right;
      transition: border-color 0.15s, background 0.15s;
    }
    .field input:focus { border-color: var(--accent); background: #fff; }
    .field .unit {
      position: absolute;
      right: 11px; top: 50%;
      transform: translateY(-50%);
      font-size: 0.8rem;
      color: var(--text-muted);
      pointer-events: none;
    }

    /* 지출 목록 */
    .expense-list { display: flex; flex-direction: column; }
    .expense-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .expense-row:last-child { border-bottom: none; }
    .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .expense-row label {
      flex: 1;
      font-size: 0.9rem;
      color: var(--text-secondary);
      cursor: pointer;
      line-height: 1.3;
    }
    .expense-row label .sub {
      display: block;
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 1px;
    }
    .expense-row .field { flex: 0 0 120px; }
    .expense-row .field input { height: 44px; font-size: 0.95rem; }

    /* 차트 */
    .chart-empty {
      text-align: center;
      padding: 32px 0;
      color: var(--text-muted);
      font-size: 0.88rem;
    }
    .custom-bars { display: flex; flex-direction: column; gap: 16px; }
    .bar-item {}
    .bar-header {
      display: flex;
      align-items: baseline;
      gap: 7px;
      margin-bottom: 7px;
    }
    .bar-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 3px; }
    .bar-label { flex: 1; font-size: 0.88rem; color: var(--text-secondary); }
    .bar-meta { display: flex; align-items: baseline; gap: 5px; white-space: nowrap; }
    .bar-pct { font-size: 0.95rem; font-weight: 700; color: var(--text-primary); }
    .bar-sep { font-size: 0.78rem; color: var(--text-muted); }
    .bar-amount { font-size: 0.82rem; color: var(--text-muted); }
    .bar-track {
      height: 10px;
      background: #efefed;
      border-radius: 99px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 99px;
      width: 0;
      transition: width 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* 요약 */
    .summary {
      display: flex;
      margin-top: 18px;
      border-top: 1px solid var(--border);
      padding-top: 18px;
      gap: 0;
    }
    .summary-cell {
      flex: 1;
      text-align: center;
      padding: 0 4px;
      border-right: 1px solid var(--border);
    }
    .summary-cell:last-child { border-right: none; }
    .summary-val { font-size: 0.95rem; font-weight: 700; margin-bottom: 4px; }
    .summary-lbl { font-size: 0.68rem; color: var(--text-muted); }
    .positive { color: var(--positive); }
    .negative { color: var(--negative); }

    /* 질문 */
    .questions { display: flex; flex-direction: column; gap: 22px; }
    .q-num {
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }
    .q-text {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 10px;
      line-height: 1.4;
    }
    .q-input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 0.95rem;
      font-family: inherit;
      background: #fafaf9;
      color: var(--text-primary);
      resize: none;
      min-height: 72px;
      overflow: hidden;
      outline: none;
      line-height: 1.55;
      transition: border-color 0.15s, background 0.15s;
    }
    .q-input:focus {
      border-color: var(--accent);
      background: #fff;
    }

    /* 하단 고정 버튼 */
    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0; right: 0;
      padding: 12px 16px calc(env(safe-area-inset-bottom) + 12px);
      background: rgba(242, 242, 240, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      z-index: 99;
    }
    .btn {
      display: block;
      width: 100%;
      max-width: 568px;
      margin: 0 auto;
      height: 52px;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.98); background: var(--accent-hover); }

    /* 이미지 미리보기 오버레이 */
    .img-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      z-index: 300;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      gap: 16px;
    }
    .img-overlay.show { display: flex; }
    .img-overlay img {
      max-width: 100%;
      max-height: 70vh;
      border-radius: 12px;
      display: block;
    }
    .img-overlay-hint {
      color: rgba(255,255,255,0.75);
      font-size: 0.88rem;
      text-align: center;
    }
    .img-overlay-close {
      margin-top: 4px;
      padding: 12px 32px;
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 99px;
      color: #fff;
      font-size: 0.9rem;
      font-family: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* 토스트 */
    .toast {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom) + 80px);
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: rgba(17,17,17,0.88);
      backdrop-filter: blur(8px);
      color: #fff;
      padding: 10px 22px;
      border-radius: 99px;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 200;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <!-- 탭 바 -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('expense')">지출 입력</button>
    <button class="tab-btn" onclick="switchTab('reflect')">돌아보기</button>
  </div>

  <!-- 탭 1: 지출 -->
  <div class="tab-panel active" id="tab-expense">
    <div class="scroll-area" id="expense-content">

      <div class="page-header"><h1>나의 소비패턴</h1></div>

      <div class="card">
        <div class="card-label">월 평균 수입</div>
        <div class="income-row">
          <span>월 평균 수입</span>
          <div class="field">
            <input type="number" id="income" placeholder="0" min="0" inputmode="numeric" />
            <span class="unit">원</span>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-label">지출 항목</div>
        <div class="expense-list" id="expenseList"></div>
      </div>

      <div class="card">
        <div class="card-label">지출 비율</div>
        <div class="chart-empty" id="chartEmpty">금액을 입력하면 비율이 표시됩니다</div>
        <div id="chartBody" style="display:none">
          <div class="custom-bars" id="customBars"></div>
          <div class="summary" id="summary"></div>
        </div>
      </div>

    </div>
    <div class="bottom-bar">
      <button class="btn" onclick="saveImage('expense-content')">이미지로 저장</button>
    </div>
  </div>

  <!-- 탭 2: 돌아보기 -->
  <div class="tab-panel" id="tab-reflect">
    <div class="scroll-area" id="reflect-content">

      <div class="page-header"><h1>돌아보기</h1></div>

      <div class="card">
        <div class="questions" id="questions"></div>
      </div>

    </div>
    <div class="bottom-bar">
      <button class="btn" onclick="saveImage('reflect-content')">이미지로 저장</button>
    </div>
  </div>

<div class="img-overlay" id="imgOverlay" onclick="closeOverlay(event)">
  <img id="overlayImg" src="" alt="저장 이미지" />
  <div class="img-overlay-hint">이미지를 길게 눌러 저장하세요</div>
  <button class="img-overlay-close" onclick="document.getElementById('imgOverlay').classList.remove('show')">닫기</button>
</div>

<div class="toast" id="toast"></div>

<script>
const CATS = [
  { key: 'housing',   label: '주거관련',           sub: '월세, 공과금 등', color: '#4f72c4' },
  { key: 'fixed',     label: '고정지출',           sub: '통신비, 보험 등', color: '#5fb8e8' },
  { key: 'food',      label: '식비',               sub: '',               color: '#f2a34e' },
  { key: 'cafe',      label: '카페',               sub: '',               color: '#b88c4a' },
  { key: 'hobby',     label: '취미',               sub: '',               color: '#5aad70' },
  { key: 'shopping',  label: '쇼핑',               sub: '',               color: '#e06060' },
  { key: 'transport', label: '교통',               sub: '',               color: '#9b6fd4' },
  { key: 'relation',  label: '관계',               sub: '선물, 모임 등',  color: '#e07ab8' },
  { key: 'savings',   label: '저축',               sub: '',               color: '#3daa94' },
  { key: 'tithe',     label: '하나님께 드린 금액', sub: '',               color: '#e8b830' },
];

const QS = [
  '가장 많은 비중을 차지하는 영역은?',
  '예상보다 많이 사용한 영역은?',
  '가장 아깝지 않았던 지출은?',
  '가장 후회되는 지출은?',
  '가장 고민이 많았던 지출은?',
  '하나님께 드리는 영역은 몇 번째 우선순위인지?',
];


function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function load() {
  try { return JSON.parse(localStorage.getItem('sobi_v2') || '{}'); } catch { return {}; }
}

function autoSave() {
  const obj = { income: document.getElementById('income').value };
  CATS.forEach(c => { obj[c.key] = document.getElementById(c.key).value; });
  QS.forEach((_, i) => { obj['q' + i] = document.getElementById('q' + i).value; });
  localStorage.setItem('sobi_v2', JSON.stringify(obj));
}

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((btn, i) => {
    btn.classList.toggle('active', (i === 0 ? 'expense' : 'reflect') === tab);
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  window.scrollTo(0, 0);
}

function buildInputs() {
  const saved = load();
  const list = document.getElementById('expenseList');
  CATS.forEach(c => {
    const row = document.createElement('div');
    row.className = 'expense-row';
    row.innerHTML = `
      <span class="dot" style="background:${c.color}"></span>
      <label for="${c.key}">${c.label}${c.sub ? `<span class="sub">${c.sub}</span>` : ''}</label>
      <div class="field">
        <input type="number" id="${c.key}" placeholder="0" min="0" inputmode="numeric" />
        <span class="unit">원</span>
      </div>`;
    list.appendChild(row);
    const input = row.querySelector('input');
    input.value = saved[c.key] || '';
    input.addEventListener('input', () => { update(); autoSave(); });
  });
  const inc = document.getElementById('income');
  inc.value = saved.income || '';
  inc.addEventListener('input', () => { update(); autoSave(); });
}

function buildQuestions() {
  const saved = load();
  const wrap = document.getElementById('questions');
  QS.forEach((q, i) => {
    const div = document.createElement('div');
    div.innerHTML = `
      <div class="q-num">Q${i + 1}</div>
      <div class="q-text">${q}</div>
      <textarea class="q-input" id="q${i}" placeholder="생각을 적어보세요"></textarea>`;
    wrap.appendChild(div);
    const ta = div.querySelector('textarea');
    ta.value = saved['q' + i] || '';
    autoResize(ta);
    ta.addEventListener('input', () => { autoResize(ta); autoSave(); });
  });
}

function vals() {
  return CATS.map(c => ({ ...c, v: Math.max(0, parseFloat(document.getElementById(c.key).value) || 0) }));
}

function update() {
  const data = vals();
  const total = data.reduce((s, d) => s + d.v, 0);
  const income = Math.max(0, parseFloat(document.getElementById('income').value) || 0);

  if (total === 0) {
    document.getElementById('chartEmpty').style.display = '';
    document.getElementById('chartBody').style.display = 'none';
    return;
  }
  document.getElementById('chartEmpty').style.display = 'none';
  document.getElementById('chartBody').style.display = '';

  const active = [...data].filter(d => d.v > 0).sort((a, b) => b.v - a.v);
  const container = document.getElementById('customBars');
  container.innerHTML = active.map(d => {
    const pct = (d.v / total * 100).toFixed(1);
    return `
      <div class="bar-item">
        <div class="bar-header">
          <span class="bar-dot" style="background:${d.color}"></span>
          <span class="bar-label">${d.label}</span>
          <span class="bar-meta">
            <span class="bar-pct">${pct}%</span>
            <span class="bar-sep">·</span>
            <span class="bar-amount">${d.v.toLocaleString()}원</span>
          </span>
        </div>
        <div class="bar-track">
          <div class="bar-fill" style="background:${d.color}" data-width="${pct}"></div>
        </div>
      </div>`;
  }).join('');

  requestAnimationFrame(() => {
    container.querySelectorAll('.bar-fill').forEach(el => {
      el.style.width = el.dataset.width + '%';
    });
  });

  const remaining = income - total;
  document.getElementById('summary').innerHTML = `
    ${income ? `<div class="summary-cell"><div class="summary-val">${income.toLocaleString()}원</div><div class="summary-lbl">월 수입</div></div>` : ''}
    <div class="summary-cell"><div class="summary-val">${total.toLocaleString()}원</div><div class="summary-lbl">총 지출</div></div>
    ${income ? `
    <div class="summary-cell"><div class="summary-val ${remaining >= 0 ? 'positive' : 'negative'}">${remaining >= 0 ? '+' : ''}${remaining.toLocaleString()}원</div><div class="summary-lbl">잔액</div></div>
    <div class="summary-cell"><div class="summary-val">${((total/income)*100).toFixed(1)}%</div><div class="summary-lbl">지출률</div></div>` : ''}`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function closeOverlay(e) {
  if (e.target === document.getElementById('imgOverlay')) {
    document.getElementById('imgOverlay').classList.remove('show');
  }
}

function saveImage(contentId) {
  showToast('이미지 생성 중...');
  const el = document.getElementById(contentId);
  html2canvas(el, {
    scale: 2,
    backgroundColor: '#f2f2f0',
    useCORS: true,
    logging: false,
    windowWidth: el.scrollWidth,
    height: el.scrollHeight,
  }).then(canvas => {
    const label = contentId === 'expense-content' ? '지출' : '돌아보기';
    const dataUrl = canvas.toDataURL('image/png');
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    if (isIOS) {
      const img = document.getElementById('overlayImg');
      img.src = dataUrl;
      document.getElementById('imgOverlay').classList.add('show');
    } else {
      const a = document.createElement('a');
      a.download = `소비패턴_${label}_${new Date().toLocaleDateString('ko-KR').replace(/\. /g, '-').replace('.', '')}.png`;
      a.href = dataUrl;
      a.click();
      showToast('이미지가 저장되었습니다');
    }
  });
}

buildInputs();
buildQuestions();
update();
</script>
</body>
</html>
